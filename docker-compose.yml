version: "3.9"

services:
  api:
    build: .
    container_name: weave-api
    ports:
      - "58000:8000"
    environment:
      - WEAVE_DATABASE_URL=sqlite:///data/weave.db
      - WEAVE_WORKSPACE_DIR=/workspace
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - weave-data:/data
      - ./workspace:/workspace:ro
    command: uvicorn services.api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - weave-net
    restart: unless-stopped

  sync:
    build: .
    container_name: weave-sync
    environment:
      - WEAVE_DATABASE_URL=sqlite:///data/weave.db
      - WEAVE_WORKSPACE_DIR=/workspace
    volumes:
      - weave-data:/data
      - ./workspace:/workspace
    command: python -c "from services.sync.watcher import WeaveSyncService; s = WeaveSyncService(['/workspace']); s.initial_sync(); s.start(); import time; time.sleep(999999)"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - weave-net
    restart: unless-stopped

  cli:
    build: .
    container_name: weave-cli
    environment:
      - WEAVE_DATABASE_URL=sqlite:///data/weave.db
      - WEAVE_WORKSPACE_DIR=/workspace
    volumes:
      - weave-data:/data
      - ./workspace:/workspace
    stdin_open: true
    tty: true
    command: /bin/sh
    depends_on:
      - api
    networks:
      - weave-net

volumes:
  weave-data:
    driver: local

networks:
  weave-net:
    driver: bridge
